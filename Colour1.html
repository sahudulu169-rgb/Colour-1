<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>ColorX — Prediction Game</title>
<style>
  /* ───────────────────────────────────────────
     RESET & CSS VARIABLES
  ─────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:         #121212;
    --bg2:        #1a1a1a;
    --bg3:        #222222;
    --card:       #1e1e1e;
    --border:     #2e2e2e;
    --gold:       #f0c040;
    --gold-dim:   #b08a20;
    --gold-glow:  rgba(240,192,64,.25);
    --white:      #f5f5f5;
    --muted:      #888;
    --green:      #22c55e;
    --green-dim:  #15803d;
    --red:        #ef4444;
    --red-dim:    #991b1b;
    --violet:     #a855f7;
    --violet-dim: #6b21a8;
    --radius:     14px;
    --radius-sm:  8px;
    --shadow:     0 8px 32px rgba(0,0,0,.6);
    font-size: 16px;
  }

  body {
    background: var(--bg);
    color: var(--white);
    font-family: 'Segoe UI', 'SF Pro Display', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ───────────────────────────────────────────
     APP WRAPPER
  ─────────────────────────────────────────── */
  #app {
    width: 100%;
    max-width: 480px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    background: var(--bg);
    position: relative;
  }

  /* ───────────────────────────────────────────
     HEADER
  ─────────────────────────────────────────── */
  header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 50;
  }

  .brand {
    font-size: 1.25rem;
    font-weight: 800;
    letter-spacing: .04em;
    color: var(--gold);
    text-transform: uppercase;
  }
  .brand span { color: var(--white); }

  .balance-box {
    text-align: right;
  }
  .balance-label {
    font-size: .65rem;
    text-transform: uppercase;
    letter-spacing: .1em;
    color: var(--muted);
  }
  .balance-value {
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: .02em;
  }

  /* ───────────────────────────────────────────
     MAIN CONTENT
  ─────────────────────────────────────────── */
  main {
    flex: 1;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  /* ───────────────────────────────────────────
     TIMER CARD
  ─────────────────────────────────────────── */
  .timer-card {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
  }
  .timer-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at top right, rgba(240,192,64,.08) 0%, transparent 65%);
    pointer-events: none;
  }

  .period-info { display: flex; flex-direction: column; gap: 4px; }
  .period-label {
    font-size: .65rem;
    text-transform: uppercase;
    letter-spacing: .12em;
    color: var(--muted);
  }
  .period-number {
    font-size: 1rem;
    font-weight: 700;
    color: var(--white);
  }

  .timer-display {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .timer-label {
    font-size: .6rem;
    text-transform: uppercase;
    letter-spacing: .12em;
    color: var(--muted);
  }
  .timer-digits {
    font-size: 2.4rem;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    letter-spacing: .05em;
    color: var(--gold);
    text-shadow: 0 0 20px var(--gold-glow);
    transition: color .3s;
  }
  .timer-digits.freeze { color: var(--red); text-shadow: 0 0 20px rgba(239,68,68,.3); }

  .freeze-badge {
    background: rgba(239,68,68,.15);
    border: 1px solid rgba(239,68,68,.4);
    color: var(--red);
    font-size: .65rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .1em;
    padding: 4px 10px;
    border-radius: 20px;
    display: none;
  }
  .freeze-badge.visible { display: inline-block; animation: pulse 1s infinite; }

  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: .5; }
  }

  /* ───────────────────────────────────────────
     LAST RESULT BANNER
  ─────────────────────────────────────────── */
  .result-banner {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    min-height: 60px;
  }
  .result-banner .rl { display: flex; flex-direction: column; gap: 3px; }
  .result-title { font-size: .65rem; text-transform: uppercase; letter-spacing: .12em; color: var(--muted); }
  .result-info { font-size: .9rem; font-weight: 600; color: var(--white); }
  .result-dot {
    width: 44px; height: 44px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem; font-weight: 800;
    transition: background .4s, color .4s;
    background: var(--bg3);
    color: var(--muted);
  }
  .result-dot.green  { background: var(--green);  color: #fff; box-shadow: 0 0 14px rgba(34,197,94,.4); }
  .result-dot.red    { background: var(--red);    color: #fff; box-shadow: 0 0 14px rgba(239,68,68,.4); }
  .result-dot.violet { background: var(--violet); color: #fff; box-shadow: 0 0 14px rgba(168,85,247,.4); }
  .result-dot.green-violet  { background: linear-gradient(135deg, var(--green) 50%, var(--violet) 50%); color: #fff; }
  .result-dot.red-violet    { background: linear-gradient(135deg, var(--red) 50%, var(--violet) 50%);   color: #fff; }

  /* ───────────────────────────────────────────
     BET SECTION
  ─────────────────────────────────────────── */
  .section-title {
    font-size: .7rem;
    text-transform: uppercase;
    letter-spacing: .14em;
    color: var(--muted);
    margin-bottom: -4px;
  }

  /* Color Buttons */
  .color-buttons {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }

  .color-btn {
    border: none;
    outline: none;
    cursor: pointer;
    border-radius: var(--radius);
    padding: 14px 8px;
    font-size: .85rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .08em;
    transition: transform .15s, opacity .2s, box-shadow .2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    position: relative;
    overflow: hidden;
  }
  .color-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,.08);
    opacity: 0;
    transition: opacity .15s;
  }
  .color-btn:hover::after { opacity: 1; }
  .color-btn:active { transform: scale(.96); }
  .color-btn:disabled { opacity: .35; cursor: not-allowed; transform: none; }
  .color-btn:disabled::after { display: none; }

  .color-btn .cb-icon { font-size: 1.4rem; }
  .color-btn .cb-mult { font-size: .65rem; opacity: .8; font-weight: 600; }

  .btn-green  { background: linear-gradient(145deg, var(--green), var(--green-dim)); color: #fff; box-shadow: 0 4px 14px rgba(34,197,94,.3); }
  .btn-violet { background: linear-gradient(145deg, var(--violet), var(--violet-dim)); color: #fff; box-shadow: 0 4px 14px rgba(168,85,247,.3); }
  .btn-red    { background: linear-gradient(145deg, var(--red), var(--red-dim)); color: #fff; box-shadow: 0 4px 14px rgba(239,68,68,.3); }

  /* Number Grid */
  .number-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
  }

  .num-btn {
    border: 1px solid transparent;
    outline: none;
    cursor: pointer;
    border-radius: var(--radius-sm);
    padding: 12px 4px;
    font-size: 1rem;
    font-weight: 800;
    transition: transform .15s, box-shadow .2s, opacity .2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    background: var(--card);
  }
  .num-btn:active { transform: scale(.93); }
  .num-btn:disabled { opacity: .3; cursor: not-allowed; }

  /* 0 and 5 → violet */
  .num-btn[data-n="0"], .num-btn[data-n="5"] {
    background: linear-gradient(145deg, #2e1065, var(--violet-dim));
    color: #e9d5ff;
    border-color: var(--violet-dim);
    box-shadow: 0 2px 10px rgba(168,85,247,.2);
  }
  /* 1,3,7,9 → green */
  .num-btn[data-n="1"],.num-btn[data-n="3"],.num-btn[data-n="7"],.num-btn[data-n="9"] {
    background: linear-gradient(145deg, #052e16, var(--green-dim));
    color: #bbf7d0;
    border-color: var(--green-dim);
    box-shadow: 0 2px 10px rgba(34,197,94,.2);
  }
  /* 2,4,6,8 → red */
  .num-btn[data-n="2"],.num-btn[data-n="4"],.num-btn[data-n="6"],.num-btn[data-n="8"] {
    background: linear-gradient(145deg, #450a0a, var(--red-dim));
    color: #fecaca;
    border-color: var(--red-dim);
    box-shadow: 0 2px 10px rgba(239,68,68,.2);
  }

  .num-badge {
    font-size: .5rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .08em;
    opacity: .75;
  }

  /* ───────────────────────────────────────────
     HISTORY TABLE
  ─────────────────────────────────────────── */
  .history-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .history-header {
    padding: 12px 16px;
    background: var(--bg3);
    border-bottom: 1px solid var(--border);
    font-size: .7rem;
    text-transform: uppercase;
    letter-spacing: .12em;
    color: var(--gold);
    font-weight: 700;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }
  thead th {
    font-size: .62rem;
    text-transform: uppercase;
    letter-spacing: .1em;
    color: var(--muted);
    padding: 8px 16px;
    text-align: left;
    background: rgba(255,255,255,.02);
  }
  tbody tr {
    border-top: 1px solid var(--border);
    transition: background .15s;
  }
  tbody tr:hover { background: rgba(255,255,255,.03); }
  tbody td {
    padding: 10px 16px;
    font-size: .82rem;
  }

  .color-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-weight: 600;
    font-size: .75rem;
    padding: 3px 9px;
    border-radius: 20px;
    text-transform: capitalize;
  }
  .pill-green  { background: rgba(34,197,94,.15);  color: var(--green); }
  .pill-red    { background: rgba(239,68,68,.15);  color: var(--red); }
  .pill-violet { background: rgba(168,85,247,.15); color: var(--violet); }
  .pill-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .pill-green  .pill-dot { background: var(--green); }
  .pill-red    .pill-dot { background: var(--red); }
  .pill-violet .pill-dot { background: var(--violet); }

  .empty-row td {
    text-align: center;
    color: var(--muted);
    font-size: .8rem;
    padding: 24px;
  }

  /* ───────────────────────────────────────────
     MODAL
  ─────────────────────────────────────────── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.75);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius) var(--radius) 0 0;
    width: 100%;
    max-width: 480px;
    padding: 24px 20px 32px;
    animation: slideUp .25s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(60px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }

  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }
  .modal-title {
    font-size: 1rem;
    font-weight: 700;
  }
  .modal-close {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--muted);
    width: 32px; height: 32px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    transition: color .15s;
  }
  .modal-close:hover { color: var(--white); }

  .modal-bet-info {
    background: var(--bg3);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    margin-bottom: 16px;
    font-size: .82rem;
    color: var(--muted);
  }
  .modal-bet-info strong { color: var(--white); }

  .bet-presets {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 14px;
  }
  .preset-btn {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--white);
    border-radius: var(--radius-sm);
    padding: 8px 4px;
    font-size: .8rem;
    font-weight: 600;
    cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .preset-btn:hover { border-color: var(--gold); background: rgba(240,192,64,.08); color: var(--gold); }
  .preset-btn.active { border-color: var(--gold); background: rgba(240,192,64,.12); color: var(--gold); }

  .bet-input-row {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }
  .bet-input-row input {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--white);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    font-size: 1rem;
    outline: none;
    transition: border-color .15s;
  }
  .bet-input-row input:focus { border-color: var(--gold); }
  .multiplier-box {
    display: flex;
    gap: 6px;
  }
  .mult-btn {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: var(--radius-sm);
    padding: 0 12px;
    font-size: .75rem;
    font-weight: 700;
    cursor: pointer;
    transition: color .15s, border-color .15s;
  }
  .mult-btn:hover { color: var(--white); border-color: var(--white); }

  .confirm-btn {
    width: 100%;
    border: none;
    outline: none;
    cursor: pointer;
    border-radius: var(--radius);
    padding: 15px;
    font-size: 1rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .08em;
    transition: opacity .2s, transform .15s;
  }
  .confirm-btn:active { transform: scale(.98); }
  .confirm-green  { background: linear-gradient(135deg, var(--green), var(--green-dim)); color: #fff; }
  .confirm-red    { background: linear-gradient(135deg, var(--red), var(--red-dim)); color: #fff; }
  .confirm-violet { background: linear-gradient(135deg, var(--violet), var(--violet-dim)); color: #fff; }
  .confirm-number { background: linear-gradient(135deg, var(--gold), var(--gold-dim)); color: #111; }

  /* ───────────────────────────────────────────
     TOAST NOTIFICATION
  ─────────────────────────────────────────── */
  #toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 40px;
    padding: 12px 22px;
    font-size: .85rem;
    font-weight: 600;
    color: var(--white);
    z-index: 500;
    box-shadow: var(--shadow);
    transition: transform .35s cubic-bezier(.34,1.56,.64,1), opacity .35s;
    white-space: nowrap;
    opacity: 0;
  }
  #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  #toast.win  { border-color: var(--green); color: var(--green); }
  #toast.lose { border-color: var(--red); color: var(--red); }

  /* ───────────────────────────────────────────
     FOOTER
  ─────────────────────────────────────────── */
  footer {
    text-align: center;
    padding: 14px;
    font-size: .65rem;
    color: var(--muted);
    border-top: 1px solid var(--border);
    letter-spacing: .06em;
  }
</style>
</head>
<body>

<div id="app">

  <!-- ── HEADER ─────────────────────────────── -->
  <header>
    <div class="brand">Color<span>X</span></div>
    <div class="balance-box">
      <div class="balance-label">Balance</div>
      <div class="balance-value" id="balanceDisplay">$1,000.00</div>
    </div>
  </header>

  <!-- ── MAIN ───────────────────────────────── -->
  <main>

    <!-- Timer Card -->
    <div class="timer-card">
      <div class="period-info">
        <div class="period-label">Period</div>
        <div class="period-number" id="periodDisplay">—</div>
        <div class="freeze-badge" id="freezeBadge">🔒 Frozen</div>
      </div>
      <div class="timer-display">
        <div class="timer-label">Time Left</div>
        <div class="timer-digits" id="timerDisplay">03:00</div>
      </div>
    </div>

    <!-- Last Result -->
    <div class="result-banner">
      <div class="rl">
        <div class="result-title">Last Result</div>
        <div class="result-info" id="lastResultText">No rounds played yet</div>
      </div>
      <div class="result-dot" id="lastResultDot">?</div>
    </div>

    <!-- Color Bet Buttons -->
    <div class="section-title">Pick a Color</div>
    <div class="color-buttons">
      <button class="color-btn btn-green"  id="btnGreen"  data-color="green"  onclick="openModal('green')">
        <span class="cb-icon">🟢</span>
        Join Green
        <span class="cb-mult">×2 payout</span>
      </button>
      <button class="color-btn btn-violet" id="btnViolet" data-color="violet" onclick="openModal('violet')">
        <span class="cb-icon">🟣</span>
        Join Violet
        <span class="cb-mult">×4.5 payout</span>
      </button>
      <button class="color-btn btn-red"    id="btnRed"    data-color="red"    onclick="openModal('red')">
        <span class="cb-icon">🔴</span>
        Join Red
        <span class="cb-mult">×2 payout</span>
      </button>
    </div>

    <!-- Number Grid -->
    <div class="section-title">Pick a Number</div>
    <div class="number-grid" id="numberGrid">
      <!-- generated by JS -->
    </div>

    <!-- History -->
    <div class="section-title">Recent History</div>
    <div class="history-card">
      <div class="history-header">🏆 Last 5 Rounds</div>
      <table>
        <thead>
          <tr>
            <th>Period</th>
            <th>Number</th>
            <th>Color</th>
            <th>You</th>
          </tr>
        </thead>
        <tbody id="historyBody">
          <tr class="empty-row"><td colspan="4">No history yet</td></tr>
        </tbody>
      </table>
    </div>

  </main>

  <footer>ColorX &copy; 2025 &nbsp;|&nbsp; For Entertainment Only</footer>
</div>

<!-- ── MODAL ──────────────────────────────── -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Place Bet</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-bet-info" id="modalInfo">
      Betting on: <strong id="modalBetLabel">—</strong>
    </div>

    <!-- Preset amounts -->
    <div class="bet-presets">
      <button class="preset-btn" onclick="setPreset(10)">$10</button>
      <button class="preset-btn" onclick="setPreset(50)">$50</button>
      <button class="preset-btn" onclick="setPreset(100)">$100</button>
      <button class="preset-btn" onclick="setPreset(500)">$500</button>
    </div>

    <!-- Custom amount -->
    <div class="bet-input-row">
      <input type="number" id="betAmountInput" placeholder="Enter amount…" min="1" />
      <div class="multiplier-box">
        <button class="mult-btn" onclick="adjustBet(.5)">½</button>
        <button class="mult-btn" onclick="adjustBet(2)">2×</button>
      </div>
    </div>

    <button class="confirm-btn" id="confirmBtn" onclick="confirmBet()">
      Confirm Bet
    </button>
  </div>
</div>

<!-- ── TOAST ──────────────────────────────── -->
<div id="toast"></div>

<!-- ────────────────────────────────────────
     JAVASCRIPT
──────────────────────────────────────────── -->
<script>
/* ══════════════════════════════════════════
   CONSTANTS & PAYOUTS
══════════════════════════════════════════ */
const ROUND_DURATION = 180;   // seconds
const FREEZE_AT      = 30;    // seconds before end
const PAYOUTS = {
  green:  2,
  red:    2,
  violet: 4.5,
  number: 9
};

// Number → color mapping
const NUM_COLOR = {
  0: 'violet', 1: 'green', 2: 'red',   3: 'green',
  4: 'red',    5: 'violet',6: 'red',   7: 'green',
  8: 'red',    9: 'green'
};

/* ══════════════════════════════════════════
   STATE (persisted via localStorage)
══════════════════════════════════════════ */
let state = {
  balance:  1000,
  period:   1000,      // starting period number
  history:  []         // last 5 rounds
};

// Active bet for the current round (cleared on round end)
let activeBet = null;   // { type: 'color'|'number', value: 'green'/'red'/'violet' | 0-9, amount: N }
let pendingBet = null;  // staging area while modal is open

/* ══════════════════════════════════════════
   PERSISTENCE
══════════════════════════════════════════ */
function saveState() {
  localStorage.setItem('colorx_state', JSON.stringify(state));
}

function loadState() {
  try {
    const raw = localStorage.getItem('colorx_state');
    if (raw) {
      const saved = JSON.parse(raw);
      state = { ...state, ...saved };
    }
  } catch(e) { /* corrupt data — use defaults */ }
}

/* ══════════════════════════════════════════
   TIMER
══════════════════════════════════════════ */
let secondsLeft = ROUND_DURATION;
let timerInterval = null;
let frozen = false;

function startTimer() {
  clearInterval(timerInterval);
  secondsLeft = ROUND_DURATION;
  frozen = false;
  updateTimerUI();

  timerInterval = setInterval(() => {
    secondsLeft--;

    if (secondsLeft <= FREEZE_AT && !frozen) {
      frozen = true;
      setFreeze(true);
    }

    if (secondsLeft <= 0) {
      resolveRound();
      startTimer();   // auto-restart
      return;
    }

    updateTimerUI();
  }, 1000);
}

function updateTimerUI() {
  const m = String(Math.floor(secondsLeft / 60)).padStart(2, '0');
  const s = String(secondsLeft % 60).padStart(2, '0');
  const el = document.getElementById('timerDisplay');
  el.textContent = `${m}:${s}`;
  el.classList.toggle('freeze', frozen);
}

function setFreeze(yes) {
  frozen = yes;
  document.getElementById('freezeBadge').classList.toggle('visible', yes);
  // Disable/enable all bet buttons
  document.querySelectorAll('.color-btn, .num-btn').forEach(b => b.disabled = yes);
}

/* ══════════════════════════════════════════
   ROUND RESOLUTION
══════════════════════════════════════════ */
function resolveRound() {
  // Generate winning number (0-9) and derive color
  const winNum   = Math.floor(Math.random() * 10);
  const winColor = NUM_COLOR[winNum];

  // Calculate outcome
  let delta = 0;
  let resultMsg = 'No bet placed';

  if (activeBet) {
    const bet = activeBet;
    let won = false;

    if (bet.type === 'color') {
      won = (bet.value === winColor);
      if (won) delta = Math.floor(bet.amount * PAYOUTS[bet.value]);
      else     delta = -bet.amount;
    } else {
      // number bet
      won = (bet.value === winNum);
      if (won) delta = Math.floor(bet.amount * PAYOUTS.number);
      else     delta = -bet.amount;
    }

    state.balance = Math.max(0, state.balance + delta);
    resultMsg = won
      ? `+$${Math.abs(delta)} WIN 🎉`
      : `-$${Math.abs(delta)} LOSS`;

    showToast(
      won ? `🎉 You won $${Math.abs(delta)}!` : `😞 You lost $${Math.abs(delta)}`,
      won ? 'win' : 'lose'
    );
  }

  // Build history entry
  const entry = {
    period:   state.period,
    number:   winNum,
    color:    winColor,
    result:   resultMsg,
    won:      delta > 0
  };

  state.history.unshift(entry);
  if (state.history.length > 5) state.history.length = 5;

  state.period++;
  activeBet = null;

  saveState();
  renderAll();
  updateLastResult(winNum, winColor);
  setFreeze(false);
}

/* ══════════════════════════════════════════
   MODAL
══════════════════════════════════════════ */
function openModal(typeValue) {
  // typeValue: 'green', 'red', 'violet', or 0-9 number
  if (frozen) return;

  const isNumber = typeof typeValue === 'number';
  pendingBet = {
    type:  isNumber ? 'number' : 'color',
    value: typeValue
  };

  // Style modal
  const colorMap = {
    green: 'green', red: 'red', violet: 'violet'
  };
  const confirmBtn = document.getElementById('confirmBtn');
  confirmBtn.className = 'confirm-btn ' + (isNumber ? 'confirm-number' : `confirm-${typeValue}`);

  document.getElementById('modalTitle').textContent = isNumber
    ? `Bet on Number ${typeValue}`
    : `Join ${capitalize(typeValue)}`;

  const payoutKey = isNumber ? 'number' : typeValue;
  document.getElementById('modalBetLabel').textContent = isNumber
    ? `Number ${typeValue} (×${PAYOUTS.number} payout)`
    : `${capitalize(typeValue)} (×${PAYOUTS[typeValue]} payout)`;

  document.getElementById('betAmountInput').value = '';
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));

  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('betAmountInput').focus(), 300);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  pendingBet = null;
}

function setPreset(amount) {
  document.getElementById('betAmountInput').value = amount;
  document.querySelectorAll('.preset-btn').forEach(b => {
    b.classList.toggle('active', Number(b.textContent.replace('$','')) === amount);
  });
}

function adjustBet(factor) {
  const inp = document.getElementById('betAmountInput');
  const current = parseFloat(inp.value) || 0;
  const newVal = Math.max(1, Math.round(current * factor));
  inp.value = newVal;
}

function confirmBet() {
  const amount = parseFloat(document.getElementById('betAmountInput').value);

  if (!amount || amount < 1) {
    showToast('⚠️ Enter a valid amount', '');
    return;
  }
  if (amount > state.balance) {
    showToast('⚠️ Insufficient balance', 'lose');
    return;
  }
  if (!pendingBet) return;

  activeBet = { ...pendingBet, amount };
  closeModal();

  const label = pendingBet.type === 'number'
    ? `#${pendingBet.value}`
    : capitalize(pendingBet.value);
  showToast(`✅ Bet $${amount} on ${label}`, '');
}

/* ══════════════════════════════════════════
   RENDER
══════════════════════════════════════════ */
function renderAll() {
  // Balance
  document.getElementById('balanceDisplay').textContent =
    '$' + state.balance.toLocaleString('en-US', { minimumFractionDigits: 2 });

  // Period
  document.getElementById('periodDisplay').textContent =
    String(state.period).padStart(6, '0');

  // History table
  renderHistory();
}

function renderHistory() {
  const tbody = document.getElementById('historyBody');
  if (!state.history.length) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="4">No history yet</td></tr>';
    return;
  }

  tbody.innerHTML = state.history.map(h => `
    <tr>
      <td style="font-family:monospace;font-size:.78rem;">${String(h.period).padStart(6,'0')}</td>
      <td>
        <strong style="font-size:1rem;">${h.number}</strong>
      </td>
      <td>
        <span class="color-pill pill-${h.color}">
          <span class="pill-dot"></span>${h.color}
        </span>
      </td>
      <td style="font-size:.75rem;color:${h.won ? 'var(--green)' : h.result.includes('No bet') ? 'var(--muted)' : 'var(--red)'}">
        ${h.result}
      </td>
    </tr>
  `).join('');
}

function updateLastResult(num, color) {
  document.getElementById('lastResultText').textContent =
    `Period ${String(state.period - 1).padStart(6,'0')} — #${num} ${capitalize(color)}`;

  const dot = document.getElementById('lastResultDot');
  dot.textContent = num;
  dot.className = 'result-dot ' + color;
}

/* ══════════════════════════════════════════
   NUMBER GRID BUILD
══════════════════════════════════════════ */
function buildNumberGrid() {
  const grid = document.getElementById('numberGrid');
  grid.innerHTML = '';
  for (let i = 0; i <= 9; i++) {
    const col = NUM_COLOR[i];
    const btn = document.createElement('button');
    btn.className = 'num-btn';
    btn.setAttribute('data-n', i);
    btn.innerHTML = `<span>${i}</span><span class="num-badge">${col}</span>`;
    btn.onclick = () => openModal(i);
    grid.appendChild(btn);
  }
}

/* ══════════════════════════════════════════
   TOAST
══════════════════════════════════════════ */
let toastTimer = null;
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = ''; }, 3000);
}

/* ══════════════════════════════════════════
   HELPERS
══════════════════════════════════════════ */
function capitalize(str) {
  return str.charAt(0).toUpperCase() + str.slice(1);
}

// Close modal on overlay click
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

/* ══════════════════════════════════════════
   INIT
══════════════════════════════════════════ */
function init() {
  loadState();
  buildNumberGrid();
  renderAll();

  // Restore last result from history if any
  if (state.history.length) {
    const last = state.history[0];
    updateLastResult(last.number, last.color);
  }

  startTimer();
}

init();
</script>
